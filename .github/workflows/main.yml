name: Deploy Rules to QRadar

on:
  push:
    paths:
      - 'rules/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Deployment Script
        env:
          QRADAR_CONSOLE_IP: ${{ secrets.QRADAR_IP }}
          QRADAR_API_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/deploy_rules.py
