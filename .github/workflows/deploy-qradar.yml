name: Deploy QRadar Offense Rules
on:
  push:
    branches: [main]
    paths:
      - 'qradar/**'
      - 'scripts/qradar_rules_deploy.py'
  workflow_dispatch:

jobs:
  deploy-qradar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python qur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Asililiqlar qur
        run: pip install requests urllib3

      - name: QRadar Rules Deploy et
        env:
          QRADAR_HOST: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/qradar_rules_deploy.py
