name: SIEM Detection Engine Sync

on:
  push:
    branches:
      - main
    paths:
      - 'qradar/aql_queries/**'
      - 'splunk/security/**'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Sync Rules to SIEM
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}   # Şəkildə SPLUNK_URL olduğu üçün belə yazırıq
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: python scripts/siem_api_sync.py
