# .github/workflows/deploy-qradar.yml
name: Deploy Rules to QRadar

on:
  push:
    branches: [main]
    paths:
      - 'qradar/rules/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Deploy Rules to QRadar
        env:
          QRADAR_HOST: ${{ secrets.QRADAR_HOST }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python qradar/deploy_qradar.py

      - name: Deploy Rules to Splunk
        env:
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: python splunk/deploy_splunk.py
        
