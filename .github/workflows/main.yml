name: Deploy Rules to SIEM

on:
  push:
    branches:
      - main
    paths:
      - 'splunk/security/**'
      - 'qradar/aql_queries/**'
      - 'scripts/siem_api_sync.py'

# Bütün workflow üçün Node.js 24-ü məcburi edirik
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Robot
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/siem_api_sync.py
