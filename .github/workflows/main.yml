name: SIEM Detection as Code Sync

on:
  push:
    branches: [ main ]
    paths:
      - 'rules/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          QRADAR_TOKEN: ${{ secrets.QRADAR_TOKEN }}
        run: python scripts/siem_api_sync.py
